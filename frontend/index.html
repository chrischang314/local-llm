<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local LLM Chat</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Markdown + sanitizer (used on assistant messages) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

  <!-- Syntax highlighting for code blocks -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github-dark.min.css"
  />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
</head>
<body>

  <!-- Login / register screen -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Local LLM Chat</h1>
      <p id="login-subtitle">Sign in to continue</p>
      <form id="login-form">
        <input id="username-input" type="text" placeholder="Username" autocomplete="username" required />
        <input id="password-input" type="password" placeholder="Password" autocomplete="current-password" required minlength="4" />
        <button type="submit" id="login-submit">Sign in</button>
      </form>
      <p class="login-toggle">
        <a href="#" id="toggle-mode">Need an account? Register</a>
      </p>
      <p id="login-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span id="sidebar-username"></span>
        <button id="logout-btn" title="Log out">&#x21A9;</button>
      </div>
      <button id="new-chat-btn">+ New Chat</button>
      <button id="settings-btn" class="secondary-btn">⚙ Settings</button>
      <nav id="conversations-list"></nav>
      <div id="health-indicator" class="health-indicator" title="Backend status">
        <span class="dot"></span>
        <span class="label">checking…</span>
      </div>
    </aside>

    <div class="main">
      <header>
        <h1 id="chat-title">Local LLM Chat</h1>
        <div class="header-controls">
          <span id="token-counter" class="token-counter hidden" title="Estimated context size"></span>
          <select id="model-select">
            <option value="">Loading models...</option>
          </select>
        </div>
      </header>

      <main id="messages"></main>

      <footer>
        <textarea id="input" placeholder="Ask something..." rows="1"></textarea>
        <button id="send-btn">Send</button>
        <button id="stop-btn" class="hidden" title="Stop generation">Stop</button>
      </footer>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <header class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="settings-close" aria-label="Close">×</button>
      </header>

      <div class="modal-body">
        <section>
          <h3>Conversation</h3>
          <p class="hint">Applies to the active conversation. Changes save automatically.</p>

          <label>System prompt
            <textarea id="settings-system-prompt" rows="3" placeholder="Optional instructions the model follows for every message in this conversation."></textarea>
          </label>

          <div class="row">
            <label>Temperature
              <input type="range" id="settings-temperature" min="0" max="2" step="0.05" />
              <span class="value-display" id="settings-temperature-val">0.70</span>
            </label>
            <label>Top P
              <input type="range" id="settings-top-p" min="0" max="1" step="0.05" />
              <span class="value-display" id="settings-top-p-val">0.90</span>
            </label>
            <label>Top K
              <input type="number" id="settings-top-k" min="1" max="500" step="1" />
            </label>
          </div>
        </section>

        <section>
          <h3>Models</h3>
          <p class="hint">Installed Ollama models. Pull a new one or remove an existing one.</p>

          <div id="model-list" class="model-list">Loading…</div>

          <div class="pull-row">
            <input id="pull-model-name" type="text" placeholder="e.g. llama3.2:3b" />
            <button id="pull-model-btn">Pull</button>
          </div>
          <pre id="pull-progress" class="pull-progress hidden"></pre>
        </section>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
