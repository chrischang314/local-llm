server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all backend routes through to the FastAPI service. The set is
    # extended (vs. the original) to cover /health and /models/* including
    # /models/pull's streaming response.
    location ~ ^/(auth|conversations|models|chat|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;

        # Required for streaming chat + model-pull responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1d;
        chunked_transfer_encoding on;
    }
}
